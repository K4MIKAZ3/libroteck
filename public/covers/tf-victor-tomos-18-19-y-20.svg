<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 533" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="400" y2="533" gradientUnits="userSpaceOnUse">
      <stop stop-color="#1E3A5F"/>
      <stop offset="1" stop-color="#152942"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#E8C9A8"/>
      <stop offset="1" stop-color="#C8956C"/>
    </linearGradient>
    <linearGradient id="bookFront" x1="120" y1="120" x2="280" y2="320" gradientUnits="userSpaceOnUse">
      <stop stop-color="#2D5A8A"/>
      <stop offset="1" stop-color="#1E3A5F"/>
    </linearGradient>
    <linearGradient id="bookSide" x1="0" y1="0" x2="1" y2="0">
      <stop stop-color="#152942"/>
      <stop offset="1" stop-color="#1E3A5F"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#000" flood-opacity="0.35"/>
    </filter>
  </defs>

  <rect width="400" height="533" fill="url(#bg)"/>
  <rect x="0" y="0" width="400" height="8" fill="url(#gold)"/>

  <!-- decorative grid -->
  <g opacity="0.08" stroke="#FAF7F2" stroke-width="1">
    <path d="M0 80H400M0 160H400M0 240H400M0 320H400M0 400H400"/>
    <path d="M80 0V533M160 0V533M240 0V533M320 0V533"/>
  </g>

  <rect x="118" y="42" width="164" height="30" rx="15" fill="url(#gold)"/>
  <text x="200" y="62" text-anchor="middle" fill="#1E3A5F" font-family="Arial, sans-serif" font-size="13" font-weight="bold" letter-spacing="1">PAQUETE DIGITAL</text>

  <!-- TF VICTOR logo area -->
  <circle cx="200" cy="108" r="28" fill="#FAF7F2" opacity="0.12"/>
  <circle cx="200" cy="108" r="22" stroke="url(#gold)" stroke-width="2" fill="none"/>
  <text x="200" y="115" text-anchor="middle" fill="url(#gold)" font-family="Arial, sans-serif" font-size="22" font-weight="bold">V</text>
  <text x="200" y="152" text-anchor="middle" fill="#FAF7F2" font-family="Arial, sans-serif" font-size="26" font-weight="bold" letter-spacing="3">TF VICTOR</text>
  <text x="200" y="172" text-anchor="middle" fill="#C8956C" font-family="Arial, sans-serif" font-size="11" letter-spacing="2">MANUALES TECNICOS</text>

  <!-- stacked books -->
  <g filter="url(#shadow)">
    <path d="M118 285 L118 205 L248 185 L248 265 Z" fill="url(#bookSide)"/>
    <path d="M128 295 L128 215 L258 195 L258 275 Z" fill="#244A73"/>
    <rect x="138" y="188" width="118" height="98" rx="4" fill="url(#bookFront)" stroke="#C8956C" stroke-width="1.5"/>
    <rect x="148" y="198" width="98" height="12" rx="2" fill="#C8956C" opacity="0.85"/>
    <text x="197" y="208" text-anchor="middle" fill="#1E3A5F" font-family="Arial, sans-serif" font-size="8" font-weight="bold">MOTORES AMERICANOS</text>
    <text x="197" y="248" text-anchor="middle" fill="#FAF7F2" font-family="Arial, sans-serif" font-size="28" font-weight="bold">20</text>
    <text x="197" y="264" text-anchor="middle" fill="#C8956C" font-family="Arial, sans-serif" font-size="10" font-weight="bold">EDICION</text>
  </g>

  <!-- edition badges -->
  <g>
    <rect x="52" y="318" width="72" height="28" rx="14" fill="#FAF7F2" opacity="0.12" stroke="#C8956C" stroke-width="1"/>
    <text x="88" y="337" text-anchor="middle" fill="#FAF7F2" font-family="Arial, sans-serif" font-size="11" font-weight="bold">ED. 18</text>
    <rect x="164" y="318" width="72" height="28" rx="14" fill="#FAF7F2" opacity="0.12" stroke="#C8956C" stroke-width="1"/>
    <text x="200" y="337" text-anchor="middle" fill="#FAF7F2" font-family="Arial, sans-serif" font-size="11" font-weight="bold">ED. 19</text>
    <rect x="276" y="318" width="72" height="28" rx="14" fill="#FAF7F2" opacity="0.12" stroke="#C8956C" stroke-width="1"/>
    <text x="312" y="337" text-anchor="middle" fill="#FAF7F2" font-family="Arial, sans-serif" font-size="11" font-weight="bold">ED. 20</text>
  </g>

  <text x="200" y="378" text-anchor="middle" fill="#FAF7F2" font-family="Arial, sans-serif" font-size="17" font-weight="bold">Tomos 18, 19 y 20</text>
  <text x="200" y="400" text-anchor="middle" fill="#FAF7F2" font-family="Arial, sans-serif" font-size="11" opacity="0.75">+ Apartados tecnicos y Curso ECU</text>

  <rect x="50" y="418" width="300" height="1" fill="#C8956C" opacity="0.5"/>

  <text x="200" y="442" text-anchor="middle" fill="#FAF7F2" font-family="Arial, sans-serif" font-size="12" opacity="0.9">Actualizados</text>
  <text x="200" y="464" text-anchor="middle" fill="#FAF7F2" font-family="Arial, sans-serif" font-size="12" opacity="0.9">Imprimibles</text>
  <text x="200" y="486" text-anchor="middle" fill="#FAF7F2" font-family="Arial, sans-serif" font-size="12" opacity="0.9">Acceso inmediato</text>

  <text x="200" y="518" text-anchor="middle" fill="url(#gold)" font-family="Arial, sans-serif" font-size="14" font-weight="bold" letter-spacing="2">LIBROTECK</text>
</svg>
